services:
  jojoflix-tor:
    image: dperson/torproxy
    container_name: jojoflix-tor
    restart: unless-stopped
    networks:
      - internal

  api:
    image: jojoflix-api:latest
    container_name: jojoflix-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      HOST: 0.0.0.0
      NODE_ENV: production
      DB_PATH: /data/jojoflix.sqlite
      TORRENTIO_PROXY: ${TORRENTIO_PROXY:-socks5://jojoflix-tor:9050}
    volumes:
      - sqlite_data:/data
    networks:
      - internal
      - caddy

volumes:
  sqlite_data:

networks:
  internal:
    driver: bridge
  caddy:
    external: true
