events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  upstream api {
    server api:3333;
  }

  server {
    listen 80;
    server_name _;

    # Flutter web app (fichiers statiques)
    root /usr/share/nginx/html;
    index index.html;

    # Transcoding routes — no buffering, long timeout (FFmpeg stream)
    location /api/transcode/ {
      proxy_pass http://api;
      proxy_buffering off;
      proxy_read_timeout 3600s;
      proxy_send_timeout 3600s;
      proxy_set_header Connection '';
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header Authorization $http_authorization;
      chunked_transfer_encoding on;
    }

    # Streaming routes — no buffering, long timeout
    location /api/stream/ {
      proxy_pass http://api;
      proxy_buffering off;
      proxy_read_timeout 3600s;
      proxy_send_timeout 3600s;
      proxy_set_header Range $http_range;
      proxy_set_header If-Range $http_if_range;
      proxy_set_header Connection '';
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      chunked_transfer_encoding on;
    }

    # Subtitle download — ffmpeg extraction can take up to 150s on remote 4K files
    location /api/subtitles/download {
      proxy_pass http://api;
      proxy_buffering off;
      proxy_read_timeout 180s;
      proxy_send_timeout 180s;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header Authorization $http_authorization;
    }

    # All other API routes
    location /api/ {
      proxy_pass http://api;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_read_timeout 30s;
    }

    # Health check
    location /health {
      proxy_pass http://api/;
      access_log off;
    }

    # Flutter SPA — toutes les routes non-API renvoient index.html
    location / {
      try_files $uri $uri/ /index.html;
    }
  }
}
