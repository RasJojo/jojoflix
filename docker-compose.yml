services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./jojoflix_app/build/web:/usr/share/nginx/html:ro
    depends_on:
      - api
    restart: unless-stopped

  api:
    build:
      context: ./jojoflix-api
      dockerfile: Dockerfile
    expose:
      - "3333"
    environment:
      NODE_ENV: production
      PORT: 3333
      HOST: 0.0.0.0
      LOG_LEVEL: info
      APP_KEY: ${APP_KEY}
      APP_URL: ${APP_URL}
      SESSION_DRIVER: cookie
      DB_PATH: /data/jojoflix.sqlite
      CONVEX_URL: ${CONVEX_URL}
      CONVEX_ADMIN_KEY: ${CONVEX_ADMIN_KEY}
      RD_API_KEY: ${RD_API_KEY}
      TMDB_API_KEY: ${TMDB_API_KEY}
      OPENSUBS_API_KEY: ${OPENSUBS_API_KEY}
      SUBDL_API_KEY: ${SUBDL_API_KEY:-}
      FLARESOLVERR_URL: ${FLARESOLVERR_URL:-}
      MEDIAFUSION_URL: ${MEDIAFUSION_URL:-}
      TORRENTIO_URL: ${TORRENTIO_URL:-https://torrentio.strem.fun}
      TORRENTIO_PROXY: ${TORRENTIO_PROXY:-}
      DRAMAYO_URL: ${DRAMAYO_URL:-}
    volumes:
      - sqlite_data:/data
    restart: unless-stopped

volumes:
  sqlite_data:
