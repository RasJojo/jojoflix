services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./jojoflix_app/build/web:/usr/share/nginx/html:ro
    depends_on:
      - api
    restart: unless-stopped

  api:
    build:
      context: ./jojoflix-api
      dockerfile: Dockerfile
    expose:
      - "3333"
    environment:
      NODE_ENV: production
      PORT: 3333
      HOST: 0.0.0.0
      LOG_LEVEL: info
      APP_KEY: ${APP_KEY}
      APP_URL: ${APP_URL}
      SESSION_DRIVER: cookie
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE: ${DB_DATABASE}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      RD_API_KEY: ${RD_API_KEY}
      TMDB_API_KEY: ${TMDB_API_KEY}
      OPENSUBS_API_KEY: ${OPENSUBS_API_KEY}
      MEDIAFUSION_URL: ${MEDIAFUSION_URL}
      TORRENTIO_URL: ${TORRENTIO_URL:-https://torrentio.strem.fun}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  migrator:
    build:
      context: ./jojoflix-api
      dockerfile: Dockerfile
    command: node ace migration:run --force
    environment:
      NODE_ENV: production
      PORT: 3333
      HOST: 0.0.0.0
      APP_KEY: ${APP_KEY}
      APP_URL: ${APP_URL:-http://localhost}
      SESSION_DRIVER: cookie
      LOG_LEVEL: info
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE: ${DB_DATABASE}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      RD_API_KEY: ${RD_API_KEY:-placeholder}
      TMDB_API_KEY: ${TMDB_API_KEY:-placeholder}
      OPENSUBS_API_KEY: ${OPENSUBS_API_KEY:-placeholder}
      MEDIAFUSION_URL: ${MEDIAFUSION_URL:-}
      TORRENTIO_URL: ${TORRENTIO_URL:-https://torrentio.strem.fun}
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_DATABASE}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
